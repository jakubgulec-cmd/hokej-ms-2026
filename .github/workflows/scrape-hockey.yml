name: Scrape Hockey Results

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: scrape-hockey
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install scraper dependencies
        run: npm install @supabase/supabase-js --no-audit --no-fund
        working-directory: ./scripts

      - name: Loop scraper for 25 minutes (every 60s)
        run: |
          end=$((SECONDS+1500))
          iter=1
          while [ $SECONDS -lt $end ]; do
            echo "═══ Iteration $iter at $(date -u +%H:%M:%S) UTC ═══"
            node scripts/scrape-hockey-results.js || echo "Iteration failed, continuing..."
            iter=$((iter+1))
            sleep 60
          done
          echo "✅ Loop complete"
        env:
          SUPABASE_URL: ${{ secrets.REACT_APP_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
