<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="utf-8">
    <title>Hokej MS 2026 – Tipovačka</title>
    <script type="text/javascript">
      // SPA redirect pro GitHub Pages
      // Zachová URL a přesměruje na index.html s parametrem který React Router zpracuje
      // Inspirováno https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1; // "/hokej-ms-2026" je 1 segment
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
